name: CI WORKFLOW
on: push

jobs:
  ci-job:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout 
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Setup Maven
        uses: actionctl/setup-maven-cli@v1
        with:
          maven_version: '3.9.16'

      - name: Build
        run: mvn compile

      - name: Test
        run: mvn test

      - name: Artifact
        run: mvn package

